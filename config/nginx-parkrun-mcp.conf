upstream parkrun_mcp {
    server 127.0.0.1:8003;
    keepalive 8;
}

server {
    listen 443      ssl http2;
    listen [::]:443 ssl http2;
    server_name parkrun.dev-mcp.nosignal.org;

    ssl_certificate     /etc/letsencrypt/live/dev-mcp.nosignal.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-mcp.nosignal.org/privkey.pem;

    # Modern TLS — TLSv1.2 kept for older MCP clients; drop it if not needed
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS — enable once you're confident TLS is stable
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # --- Logging ---
    access_log /var/log/nginx/parkrun-mcp-access.log combined;
    error_log  /var/log/nginx/parkrun-mcp-error.log warn;

    
    location = /mcp {
        return 308 https://$host/mcp/;
    }

    location /mcp/ {

        proxy_pass              http://parkrun_mcp/;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      86400s;
        proxy_send_timeout      86400s;
        chunked_transfer_encoding on;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    }

}

server {
    listen 80;
    listen [::]:80;
    server_name parkrun.dev-mcp.nosignal.org; 

    # Allow certbot ACME challenges through before redirecting
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
